<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escala Maker — Everyday Devocional</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-shell">

    <!-- HEADER -->
    <header class="app-header">
      <div class="header-logo">
        <!-- Sol SVG inline — fiel ao logo original -->
        <svg class="logo-sun" viewBox="0 0 120 80" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- raios laterais esquerda -->
          <line x1="4"  y1="62" x2="22" y2="62" stroke="#D45F2A" stroke-width="4" stroke-linecap="round"/>
          <line x1="14" y1="48" x2="28" y2="57" stroke="#D45F2A" stroke-width="4" stroke-linecap="round"/>
          <!-- raio central topo -->
          <line x1="60" y1="4"  x2="60" y2="22" stroke="#D45F2A" stroke-width="4" stroke-linecap="round"/>
          <!-- raios diagonais -->
          <line x1="28" y1="22" x2="38" y2="34" stroke="#D45F2A" stroke-width="4" stroke-linecap="round"/>
          <line x1="92" y1="22" x2="82" y2="34" stroke="#D45F2A" stroke-width="4" stroke-linecap="round"/>
          <!-- raios laterais direita -->
          <line x1="116" y1="62" x2="98" y2="62" stroke="#D45F2A" stroke-width="4" stroke-linecap="round"/>
          <line x1="106" y1="48" x2="92" y2="57" stroke="#D45F2A" stroke-width="4" stroke-linecap="round"/>
          <!-- semicírculo -->
          <path d="M 18 62 A 42 42 0 0 1 102 62" stroke="#D45F2A" stroke-width="4" fill="none" stroke-linecap="round"/>
          <!-- linha do horizonte -->
          <line x1="4" y1="68" x2="116" y2="68" stroke="#D45F2A" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">ESCALA MAKER</span>
      </div>
      <div class="header-sub">Everyday Devocional</div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="app-main">

      <!-- MÊS -->
      <section class="section">
        <div class="section-label">MÊS</div>
        <div class="month-grid" id="monthGrid"></div>
        <div class="month-info" id="monthInfo"></div>
      </section>

      <div class="separator"></div>

      <!-- MEMBROS -->
      <section class="section">
        <div class="section-label">MEMBROS</div>
        <div class="input-row">
          <input type="text" id="inputNome" class="text-input" placeholder="Nome do membro…" autocomplete="off" />
          <button class="btn-secondary" onclick="adicionarNome()">Adicionar</button>
        </div>
        <ul class="list-items" id="listNomes" data-label="nomes"></ul>
        <div class="list-actions">
          <button class="btn-secondary btn-sm" onclick="limparLista('nomes')">Limpar lista</button>
        </div>
      </section>

      <div class="separator"></div>

      <!-- SALMOS -->
      <section class="section">
        <div class="section-label">SALMOS</div>
        <div class="input-row">
          <input type="text" id="inputSalmo" class="text-input" placeholder="Ex: 57 ou 57:1-5" autocomplete="off" />
          <button class="btn-secondary" onclick="adicionarSalmo()">Adicionar</button>
        </div>
        <div class="error-msg" id="salmoErro"></div>
        <ul class="list-items" id="listSalmos" data-label="salmos"></ul>
        <div class="list-actions">
          <button class="btn-secondary btn-sm" onclick="limparLista('salmos')">Limpar lista</button>
        </div>
      </section>

      <div class="separator"></div>

      <!-- AÇÃO -->
      <section class="section">
        <div class="status-msg" id="statusMsg" style="display:none"></div>
        <div class="progress-bar-wrap" id="progressWrap" style="display:none">
          <div class="progress-bar-inner" id="progressBar"></div>
        </div>
        <button class="btn-primary" id="btnGerar" onclick="gerarEscala()">Gerar Escala</button>
      </section>

    </main>

    <!-- PREVIEW / RESULTADO -->
    <div class="result-panel" id="resultPanel" style="display:none">
      <div class="result-header">
        <span class="result-title">Imagens Geradas</span>
        <button class="btn-secondary btn-sm" onclick="baixarTudo()">⬇ Baixar todas</button>
      </div>
      <div class="result-grid" id="resultGrid"></div>
    </div>

  </div>

  <!-- Canvas oculto para geração das imagens -->
  <canvas id="offscreen" style="display:none"></canvas>

  <script src="app.js"></script>
</body>
</html>
